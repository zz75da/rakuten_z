services:
  # === Database for Airflow and MLflow ===
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
      POSTGRES_MULTIPLE_DATABASES: airflow,mlflow
      POSTGRES_MULTIPLE_USERS: mlflow_user:mlflow_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.2

  # === MinIO (S3 for DVC and MLflow) ===
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.3

  # === MLflow Tracking Server ===
  # REMOVED 2026-05-02: tracking centralized on DagsHub.
  # All services use MLFLOW_TRACKING_URI=https://dagshub.com/zz75da/rakuten_z.mlflow (.env)
  # See mlflow_docker/Dockerfile for the legacy container if you need to re-enable it.

  # === Airflow Init ===
  airflow_init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-init
    entrypoint: ["/bin/bash", "/app/airflow_init.sh"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW_UID: 50000
      AIRFLOW_GID: 0
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./scripts:/opt/airflow/scripts
      - ./artifacts:/opt/airflow/artifacts
      - ./params.yaml:/app/params.yaml
    extra_hosts:
      - "postgres:172.20.0.2"
      - "gate-api:172.20.0.6"
      - "train-api:172.20.0.7"
      - "predict-api:172.20.0.8"
      - "minilm-encoder:172.20.0.14"
      - "clip-encoder:172.20.0.15"
      - "pushgateway:172.20.0.12"
    depends_on:
      postgres:
        condition: service_healthy
      gate-api:
        condition: service_healthy
    restart: "no"
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.4

  # === Airflow Web + Scheduler ===
  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW_CONN_TRAIN_API: http://train-api:5002
      AIRFLOW_CONN_MINILM_ENCODER: http://minilm-encoder:5004
      AIRFLOW_CONN_CLIP_ENCODER: http://clip-encoder:5007
      AIRFLOW_CONN_GATE_API: http://gate-api:5000
      AIRFLOW_CONN_PREDICT_API: http://predict-api:5003
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /tmp/airflow/logs
      # Reconnect on stale pool connections (handles transient Postgres DNS failures)
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "1800"
      # Give tasks 30 min without a heartbeat before declaring zombie (default: 5 min)
      # Prevents task kills during Postgres DNS outages or system pressure under heavy CPU/RAM load
      AIRFLOW__SCHEDULER__SCHEDULER_ZOMBIE_TASK_THRESHOLD: "14400"
      # Reduce gunicorn workers (default 4) to avoid OOM when train-api consumes 3-4 GB
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW__WEBSERVER__WORKER_TIMEOUT: "120"
      SECRET_KEY: default_secret
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-http
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      DAGSHUB_CLIENT_TOKENS_CACHE: /opt/airflow/.dagshub_tokens
      #DAGSHUB_CLIENT_TOKENS_CACHE: /root/.dagshub_tokens
      #AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      #AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      #MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      #MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      #MLFLOW_ARTIFACT_URI: ${MLFLOW_ARTIFACT_URI}
      #DAGSHUB_USER: ${DAGSHUB_USER}
      #DAGSHUB_TOKEN: ${DAGSHUB_TOKEN}
      #MLFLOW_TRACKING_USERNAME: ${DAGSHUB_USER}
      #MLFLOW_TRACKING_PASSWORD: ${DAGSHUB_TOKEN}      
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./:/opt/airflow
      - ./airflow/init_airflow.sh:/opt/airflow/init_airflow.sh:ro
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/tmp/airflow/logs
      - ./airflow/airflow.cfg:/opt/airflow/airflow.cfg
      - ./params.yaml:/app/params.yaml
      - ./data:/opt/airflow/data
      - ./data/X_train_update.csv:/app/data/X_train_update.csv:ro,delegated
      - ./data/Y_train_CVw08PX.csv:/app/data/Y_train_CVw08PX.csv:ro,delegated
      - ./data/artifacts:/app/data/artifacts
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data/feature_cache:/app/data/feature_cache
    depends_on:
      postgres:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
      train-api:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Cleaning stale PIDs...'; \
      rm -f /opt/airflow/airflow-webserver.pid; \
      echo 'Starting Airflow...'; \
      airflow webserver -p 8080 & \
      airflow scheduler
      "
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
    extra_hosts:
      - "postgres:172.20.0.2"
      - "gate-api:172.20.0.6"
      - "train-api:172.20.0.7"
      - "predict-api:172.20.0.8"
      - "minilm-encoder:172.20.0.14"
      - "clip-encoder:172.20.0.15"
      - "pushgateway:172.20.0.12"
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.5

  # === gate-api ===
  gate-api:
    build:
      context: ./gate-api
      dockerfile: Dockerfile
    container_name: gate-api
    ports:
      - "5004:5000"
    environment:
      SECRET_KEY: default_secret
      ADMIN_PASSWORD: admin_pass
      USER_PASSWORD: user_pass
      DAGSHUB_CLIENT_TOKENS_CACHE: /root/.dagshub_tokens
    volumes:
      - ./params.yaml:/app/params.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.6

  # === train-api ===
  train-api:
    build:
      context: ./train-api
      dockerfile: Dockerfile
      provenance: false
    container_name: train-api
    image: rakuten_mlops_services-train-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Service config
      GATE_API_URL: http://gate-api:5000
      SECRET_KEY: default_secret
      USE_DEV_IMAGES: "false"
      PCA_COMPONENTS: 300
      FEATURE_BATCH_SIZE: 500
      TEXT_BATCH_SIZE: 2000
      TRAIN_CSV_X_PATH: /app/data/X_train_update.csv
      TRAIN_CSV_Y_PATH: /app/data/Y_train_CVw08PX.csv
      DAGSHUB_CLIENT_TOKENS_CACHE: /root/.dagshub_tokens
      LOG_LEVEL: INFO

      # Replace glibc with jemalloc: eliminates tcache/fasttop corruption from TF's
      # BFCAllocator during model.fit().  Inherited by all child subprocesses.
      LD_PRELOAD: "/usr/lib/x86_64-linux-gnu/libjemalloc.so.2"
      CUDA_VISIBLE_DEVICES: ""

      # Airflow connections
      AIRFLOW_CONN_GATE_API: http://gate-api:5000
      AIRFLOW_CONN_TRAIN_API: http://train-api:5002
      AIRFLOW_CONN_MINILM_ENCODER: http://minilm-encoder:5004

      # DagsHub / MLflow
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      #AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
      #DAGSHUB_USER: ${DAGSHUB_USER}
      #DAGSHUB_TOKEN: ${DAGSHUB_TOKEN}
      #MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      #MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      #MLFLOW_ARTIFACT_URI: ${MLFLOW_ARTIFACT_URI}
      MLFLOW_EXPERIMENT_NAME: rakuten_z
      #MLFLOW_TRACKING_USERNAME: ${DAGSHUB_USER}
      #MLFLOW_TRACKING_PASSWORD: ${DAGSHUB_TOKEN}

      # Optimization for large dataset
      SKIP_DVC_PULL: "1"
    volumes:
      - ./data/images/image_train:/app/images/image_train:ro,delegated
      - ./data/images/image_test:/app/images/image_test:ro,delegated
      - ./data/images/image_sample:/app/images/image_sample:ro,delegated
      - ./data/X_train_update.csv:/app/data/X_train_update.csv:ro,delegated
      - ./data/Y_train_CVw08PX.csv:/app/data/Y_train_CVw08PX.csv:ro,delegated
      - ./params.yaml:/app/params.yaml:ro,delegated
      - ./data/artifacts:/app/data/artifacts
      - ./data/feature_cache:/app/data/feature_cache
      - ./data/jobs:/app/data/jobs
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "5002"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "5002:5002"
    depends_on:
      gate-api:
        condition: service_healthy
      minilm-encoder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5002/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20       # wait up to ~10 minutes
      start_period: 60s
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.7

  # === predict-api ===
  predict-api:
    build:
      context: ./predict-api
      dockerfile: Dockerfile
    container_name: predict-api
    image: rakuten_mlops_services-predict-api:latest
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      SECRET_KEY: default_secret
      DAGSHUB_CLIENT_TOKENS_CACHE: /root/.dagshub_tokens
      # MLflow model config
      MLFLOW_MODEL_NAME: rakuten_multimodal
      MLFLOW_MODEL_STAGE: Production

      # DagsHub / MLflow
      #AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      #AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
      #DAGSHUB_USER: ${DAGSHUB_USER}
      #DAGSHUB_TOKEN: ${DAGSHUB_TOKEN}
      #MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      #MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      MLFLOW_EXPERIMENT_NAME: rakuten_z
      #MLFLOW_TRACKING_USERNAME: ${DAGSHUB_USER}
      #MLFLOW_TRACKING_PASSWORD: ${DAGSHUB_TOKEN}
      ARTIFACTS_PATH: /app/data/artifacts
      LD_PRELOAD: "/usr/local/lib/libjemalloc.so.2"
      # Optimization for large dataset
      SKIP_DVC_PULL: "0"
    volumes:
      - ./params.yaml:/app/params.yaml:ro,delegated
      - ./data/artifacts:/app/data/artifacts
      - ./data/hf_cache:/root/.cache/huggingface
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "5003"]
    depends_on:
      train-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20       # wait up to ~10 minutes
      start_period: 60s
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.8

  # === Prometheus ===
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
    command: >
      --config.file=/etc/prometheus/prometheus.yml
      --storage.tsdb.path=/prometheus
      --web.console.libraries=/etc/prometheus/console_libraries
      --web.console.templates=/etc/prometheus/consoles
      --web.enable-lifecycle
      --web.external-url=http://localhost:9090

    depends_on:
      - predict-api
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.9

  # === Grafana ===
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./monitoring/grafana_dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.10

  # === Streamlit ===
  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile.streamlit
      args:
        DOCKER_BUILDKIT: 1
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      - MODEL_API_URL=http://predict-api:5003
      - GATE_API_URL=http://gate-api:5000/login
      - ARTIFACTS_PATH=/app/artifacts
      - IMAGE_ROOT_TRAIN=/app/images/image_train
      - IMAGE_ROOT_TEST=/app/images/image_test
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - MLFLOW_TRACKING_USERNAME=${DAGSHUB_USER}
      - MLFLOW_TRACKING_PASSWORD=${DAGSHUB_TOKEN}
      - MODEL_NAME=rakuten_multimodal
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

    volumes:
      - ./streamlit:/app
      - ./data/artifacts:/app/data/artifacts:ro
    depends_on:
      - predict-api
      - gate-api
      # mlflow removed: tracking is on DagsHub (external)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.11



  # === Pushgateway (Prometheus metrics) ===
  pushgateway:
    image: prom/pushgateway
    container_name: pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.12

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    environment:
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
    volumes:
      - ./monitoring/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl
      - ./monitoring/alertmanager-templates:/etc/alertmanager/templates
      - alertmanager_data:/alertmanager
    entrypoint:
      - sh
      - -c
      - |
        sed -e "s|__GMAIL_USER__|$$GMAIL_USER|g" \
            -e "s|__GMAIL_APP_PASSWORD__|$$GMAIL_APP_PASSWORD|g" \
            -e "s|__ALERT_EMAIL_TO__|$$ALERT_EMAIL_TO|g" \
            /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml &&
        /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.13
    restart: unless-stopped


  # === clip-encoder ===
  # Lightweight FastAPI service (~50 MB idle).
  # Loads CLIP ViT-B/32 text encoder only when POST /encode is called,
  # then unloads after saving text_features_clip.npy (512-d embeddings).
  clip-encoder:
    build:
      context: ./clip-encoder
      dockerfile: Dockerfile
    container_name: clip-encoder
    restart: unless-stopped
    ports:
      - "5006:5007"
    environment:
      - PYTHONUNBUFFERED=1
      - TRAIN_CSV_X_PATH=/app/data/X_train_update.csv
      - CLIP_CACHE_PATH=/app/data/feature_cache/text_features_clip.npy
      - CLIP_BATCH_SIZE=64
    volumes:
      - ./data/X_train_update.csv:/app/data/X_train_update.csv:ro
      - ./data/feature_cache:/app/data/feature_cache
      - ./params.yaml:/app/params.yaml:ro
      - ./data/hf_cache:/root/.cache/huggingface   # persist model download across rebuilds
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.15
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3


  # === minilm-encoder ===
  # Lightweight FastAPI service (~50 MB idle).
  # Loads SentenceTransformer only when POST /encode is called,
  # then unloads the model after saving text_features_minilm.npy.
  minilm-encoder:
    build:
      context: ./minilm-encoder
      dockerfile: Dockerfile
    container_name: minilm-encoder
    restart: unless-stopped
    ports:
      - "5005:5004"
    environment:
      - PYTHONUNBUFFERED=1
      - TRAIN_CSV_X_PATH=/app/data/X_train_update.csv
      - MINILM_CACHE_PATH=/app/data/feature_cache/text_features_minilm.npy
      - MINILM_BATCH_SIZE=256
    volumes:
      - ./data/X_train_update.csv:/app/data/X_train_update.csv:ro
      - ./data/feature_cache:/app/data/feature_cache
    networks:
      rakuten_mlops_network:
        ipv4_address: 172.20.0.14
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3


networks:
  rakuten_mlops_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  minio_data:
  grafana-storage:
  prometheus_data:
  alertmanager_data:
  feature_cache:
    driver: local
  artifacts:
    driver: local
