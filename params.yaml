# =============================================================================
# Rakuten MLOps — Experiment Parameters
# =============================================================================
# Edit this file to run a new experiment. The DAG reads it at training time
# and MLflow logs every value automatically, so each DAG run is one
# comparable experiment point in DagsHub → Experiments.
#
# SAFE TO CHANGE:  model.*, model_minilm.*, minilm.normalize_embeddings,
#                  preprocess.pca_components, preprocess.cv_max_features,
#                  preprocess.n_text_pca_components, train.epochs
# DO NOT CHANGE:   preprocess.image_batch_size, preprocess.minilm_batch_size,
#                  train.batch_size  — RAM/OOM risk on this machine (20 GB disk,
#                  training already peaks at ~3 GB RAM)
# =============================================================================

preprocess:
  image_size: [224, 224]

  # --- Batch sizes: DO NOT INCREASE (RAM / OOM risk) ---
  image_batch_size: 64        # ResNet50 feature extraction; 64 × 3×224×224 ≈ 18 MB/batch
  minilm_batch_size: 256      # sentence-transformers encoding batch
  pca_batch_size: 512         # IncrementalPCA fitting batch

  # --- Safe to experiment ---
  pca_components: 256         # image PCA output dim — reduced from 384
                              # 2024 papers: 256d retains ~95% variance for frozen ResNet50 at 85k samples
                              # reduces fusion layer size 33%, ~20% faster training — no OOM risk
                              # note: triggers PCA rerun on next DAG run (pca_fingerprint detects size change)
  n_text_pca_components: 512  # CV text PCA output dim — 1024 doubles PCA time (~25-30h total)
                              # test l2_reg + epochs fixes first at 512, upgrade dims later if needed
  cv_max_features: 10000      # CountVectorizer vocabulary size — 10000 works fine with pca_txt=512
                              # OOM was caused by pca_txt=2048, not cv_max_features
                              # text_features.npy cached at 10000 features (3.4 GB)

train:
  # --- DO NOT INCREASE batch_size (OOM risk) ---
  batch_size: 128

  # --- Safe to experiment ---
  epochs: 60                  # increased from 50 — MiniLM best@43, early stop fires at 51
  random_seed: 42

model:
  # Neural network architecture — all safe to experiment
  learning_rate: 0.0002       # 2024 papers: 0.0001–0.0003 optimal for dense heads on frozen encoders
                              # was 0.0005 — slightly aggressive for frozen CLIP/mpnet
  hidden_1: 512               # reverted from 1024 — wider net overfit worse (gap 14.5-15.6%)
  hidden_2: 256               # image branch; matches new pca_components=256 (1:1 ratio, clean)
  dropout_1: 0.35             # text branch — reduced from 0.45; 2025 papers: 30-40% prevents modality collapse
  dropout_2: 0.25             # image branch — reduced from 0.35; pre-trained ResNet50 features less noisy
  l2_reg: 0.0001              # confirmed sweet spot — keep
  use_layer_norm: true        # LayerNorm after first Dense in each branch (not BatchNorm)
                              # 2024 multimodal papers: LayerNorm adapts per-sample; improves calibration
  early_stopping_patience: 8  # epochs without val_macro_f1 improvement before stopping
  lr_patience: 4              # confirmed — lrp=4 produced best results
  lr_factor: 0.5              # LR reduction multiplier
  focal_gamma: 2.0            # base gamma — overridden per encoder below (sparse vs dense)
  use_late_fusion: true       # late fusion: separate text/image branches, learned gated average

model_countvectorizer:
  # Architecture overrides for TF-IDF+OCR (sparse) encoder only.
  focal_gamma: 2.5            # sparse TF-IDF features → higher gamma focuses more on hard minority classes
                              # 2025: gamma=2.5 recommended for sparse input with 4:1 imbalance

model_clip:
  # Architecture overrides for CLIP ViT-B/32 encoder only.
  focal_gamma: 1.5            # CLIP already handles easy examples well → less focusing needed
                              # 2025: gamma=1.5 for dense well-aligned embeddings

model_minilm:
  # Architecture overrides for paraphrase-multilingual-MiniLM-L12-v2 encoder only.
  # Trainer applies these on top of model: when text_encoder="minilm".
  # CV and CLIP are unaffected.
  #
  # Early fusion: input_dim=768 (384 text + 384 image) — hidden_1=1024 justified (1.3x input).
  # Late fusion:  text branch only sees text_dim=384 — hidden_1=512 (1.3x text_dim) is correct.
  #               hidden_1=1024 on text_dim=384 is a 2.7x expansion — overfit risk on 85k samples.
  #               image branch gets hidden_2=256 (base model, 0.67x img_dim=384 — fine).
  hidden_1: 512   # late fusion text branch (1.3× text_dim=384)
  hidden_2: 256   # updated: image branch now matches new pca_components=256

model_mpnet:
  # Architecture overrides for paraphrase-multilingual-mpnet-base-v2 encoder only.
  # Trainer applies these on top of model: when text_encoder="mpnet".
  # Any key here overrides the matching key in model: above.
  #
  # Early fusion: input_dim = 768 (mpnet text) + 384 (image PCA) = 1152
  # Late fusion:  text branch sees text_dim=768; image branch sees img_dim=384
  #               hidden_1=768 would be exact match; 1152 is 1.5x text_dim — acceptable upper bound
  #               (within the 1x–1.5x expansion range recommended for single-branch networks)
  #
  # Run 1 (early fusion): hidden_1=1024 < input_dim=1152 → bottleneck; best_val_acc=0.7719
  # Run 2 (early fusion): hidden_1=1152 — no bottleneck; best_val_acc=0.7746
  # Run 3 (late fusion):  text hidden_1=768 (exact match) — recommended for late fusion
  hidden_1: 768               # late fusion text branch: text_dim=768 → no expansion
  hidden_2: 256               # updated: matches new pca_components=256
  dropout_1: 0.4              # slightly reduced from 0.5; still higher than base to combat mpnet overfit
  dropout_2: 0.3              # slightly reduced from 0.4; same rationale

minilm:
  # paraphrase-multilingual-MiniLM-L12-v2 encoder settings
  normalize_embeddings: false  # raw embeddings for NN classification — scale info helps dense head
                               # (E5-small needed true; paraphrase models work better with false)
                               # best result 0.7213 was with normalize=false

mpnet:
  # paraphrase-multilingual-mpnet-base-v2 encoder settings
  normalize_embeddings: false  # raw 768-d embeddings — same rationale as MiniLM above

clip:
  # CLIP ViT-B/32 text encoder settings — safe to experiment
  batch_size: 512              # CPU text encoding — larger batches allow BLAS parallelism (was 64: too slow ~4h+)
  normalize_embeddings: false  # false: raw embeddings avoid scale mismatch with unnormalised image PCA features
                               # true degraded accuracy (normalised CLIP text vs unnormalised ResNet image = unbalanced input)
