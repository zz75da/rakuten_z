groups:
- name: rakuten-mlops-alerts
  rules:

  # ── API service availability ───────────────────────────────────────────────

  - alert: TrainAPIDown
    expr: up{job="train-api"} == 0
    for: 3m
    labels:
      severity: critical
      service: train-api
    annotations:
      summary: Train API is not responding
      description: The train-api container has been unreachable for 3 minutes.

  - alert: PredictAPIDown
    expr: up{job="predict-api"} == 0
    for: 3m
    labels:
      severity: critical
      service: predict-api
    annotations:
      summary: Predict API is not responding
      description: The predict-api container has been unreachable for 3 minutes.

  - alert: MiniLMEncoderDown
    expr: up{job="minilm-encoder"} == 0
    for: 3m
    labels:
      severity: warning
      service: minilm-encoder
    annotations:
      summary: MiniLM encoder service is not responding
      description: >
        The minilm-encoder container has been unreachable for 3 minutes.
        MiniLM text encoding will fail if the Airflow DAG is triggered.

  - alert: CLIPEncoderDown
    expr: up{job="clip-encoder"} == 0
    for: 3m
    labels:
      severity: warning
      service: clip-encoder
    annotations:
      summary: CLIP encoder service is not responding
      description: >
        The clip-encoder container has been unreachable for 3 minutes.
        CLIP text encoding will fail if the Airflow DAG is triggered.

  - alert: GateAPIDown
    expr: up{job="gate-api"} == 0
    for: 2m
    labels:
      severity: critical
      service: gate-api
    annotations:
      summary: Gate API is not responding
      description: The gate-api (JWT auth) container has been unreachable for 2 minutes. All authenticated endpoints are blocked.

  # ── Airflow ───────────────────────────────────────────────────────────────

  - alert: AirflowSchedulerDown
    expr: airflow_scheduler_heartbeat < 1
    for: 5m
    labels:
      severity: critical
      service: airflow
    annotations:
      summary: Airflow scheduler is down
      description: The Airflow scheduler has not sent a heartbeat for 5 minutes.

  - alert: AirflowDagFailed
    expr: airflow_dag_run_failed > 0
    for: 2m
    labels:
      severity: warning
      service: airflow
    annotations:
      summary: "DAG {{ $labels.dag_id }} has failed runs"
      description: One or more Airflow DAG runs have failed.

  # ── Storage & database ────────────────────────────────────────────────────

  - alert: PostgresqlDown
    expr: up{job="postgres"} == 0
    for: 2m
    labels:
      severity: critical
      service: postgres
    annotations:
      summary: PostgreSQL is not running
      description: The PostgreSQL container (used by Airflow and MLflow) has been down for 2 minutes.

  # MinIODown alert removed — Prometheus cannot scrape MinIO metrics without
  # bearer token auth. MinIO health is monitored via Docker healthcheck.
  # MLflow artifacts use DagsHub (S3), not local MinIO.

  - alert: DiskSpaceLow
    expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100 < 10
    for: 10m
    labels:
      severity: critical
      service: storage
    annotations:
      summary: "Only {{ $value | printf \"%.1f\" }}% disk space remaining"
      description: >
        Root filesystem is nearly full. Feature caches (~2.4 GB) and model
        artifacts will fail to write. Free space or prune Docker images.

  # ── Model quality — per encoder ───────────────────────────────────────────

  - alert: CVModelValAccuracyLow
    expr: model_final_val_accuracy{encoder="countvectorizer"} < 0.72
    for: 30m
    labels:
      severity: warning
      service: train-api
    annotations:
      summary: "CV (TF-IDF+OCR) model val accuracy is {{ $value | printf \"%.2f\" }}"
      description: >
        The TF-IDF+OCR model's validation accuracy has dropped below 0.72
        after the latest training run. Consider retraining or checking data quality.

  - alert: mpnetModelValAccuracyLow
    expr: model_final_val_accuracy{encoder="mpnet"} < 0.72
    for: 30m
    labels:
      severity: warning
      service: train-api
    annotations:
      summary: "mpnet model val accuracy is {{ $value | printf \"%.2f\" }}"
      description: >
        The mpnet model's validation accuracy has dropped below 0.72
        after the latest training run. Consider retraining or checking data quality.

  - alert: MiniLMModelValAccuracyLow
    expr: model_final_val_accuracy{encoder="minilm"} < 0.70
    for: 30m
    labels:
      severity: warning
      service: train-api
    annotations:
      summary: "MiniLM model val accuracy is {{ $value | printf \"%.2f\" }}"
      description: >
        The MiniLM model's validation accuracy has dropped below 0.70
        after the latest training run. Consider retraining or checking data quality.

  - alert: CLIPModelValAccuracyLow
    expr: model_final_val_accuracy{encoder="clip"} < 0.70
    for: 30m
    labels:
      severity: warning
      service: train-api
    annotations:
      summary: "CLIP model val accuracy is {{ $value | printf \"%.2f\" }}"
      description: >
        The CLIP ViT-B/32 model's validation accuracy has dropped below 0.70
        after the latest training run. Consider retraining or checking data quality.

  # ── Prediction latency ────────────────────────────────────────────────────

  - alert: PredictionLatencyHigh
    expr: histogram_quantile(0.95, rate(predict_request_latency_seconds_bucket[5m])) > 5
    for: 10m
    labels:
      severity: warning
      service: predict-api
    annotations:
      summary: "P95 prediction latency is {{ $value | printf \"%.1f\" }}s"
      description: >
        95th-percentile prediction latency exceeds 5 seconds. This may indicate
        the model is overloaded or ResNet50 feature extraction is slow.

  - alert: HighPredictionErrorRate
    expr: >
      rate(predict_requests_total{status=~"5.."}[5m])
      /
      rate(predict_requests_total[5m])
      > 0.1
    for: 5m
    labels:
      severity: critical
      service: predict-api
    annotations:
      summary: "Prediction error rate is {{ $value | printf \"%.0f%%\" }}"
      description: More than 10% of prediction requests are returning 5xx errors.

  # ── Drift detection ───────────────────────────────────────────────────────

  - alert: PredictionConfidenceDrift
    expr: histogram_quantile(0.5, sum(rate(prediction_confidence_bucket[15m])) by (le, endpoint)) < 0.4
    for: 15m
    labels:
      severity: warning
      service: predict-api
    annotations:
      summary: "Median prediction confidence dropped to {{ $value | printf \"%.2f\" }}"
      description: >
        The median confidence of predictions on {{ $labels.endpoint }} is below 0.40.
        The model may be receiving out-of-distribution inputs — possible data drift.

  - alert: PredictionEntropyHigh
    expr: histogram_quantile(0.9, sum(rate(prediction_entropy_bucket[15m])) by (le, endpoint)) > 2.5
    for: 15m
    labels:
      severity: warning
      service: predict-api
    annotations:
      summary: "P90 prediction entropy is {{ $value | printf \"%.2f\" }} nats on {{ $labels.endpoint }}"
      description: >
        The 90th-percentile entropy of prediction distributions exceeds 2.5 nats.
        High entropy indicates the model is uncertain — possible concept drift.

  - alert: ClassDistributionSkewed
    expr: >
      max(rate(prediction_class_total[30m])) by (label, endpoint)
      /
      sum(rate(prediction_class_total[30m])) by (endpoint)
      > 0.8
    for: 20m
    labels:
      severity: warning
      service: predict-api
    annotations:
      summary: "Class {{ $labels.label }} accounts for >80% of predictions on {{ $labels.endpoint }}"
      description: >
        Class distribution is heavily skewed. A single label exceeds 80% of
        recent predictions. Check for data quality issues or feature pipeline failures.

  # ── Resource usage ────────────────────────────────────────────────────────

  - alert: HighMemoryUsage
    expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
    for: 10m
    labels:
      severity: warning
      service: system
    annotations:
      summary: "Memory usage at {{ $value | printf \"%.1f\" }}%"
      description: >
        System memory usage exceeds 90%. Training runs (~3 GB peak per encoder;
        CV, CLIP, and MiniLM run sequentially) may OOM-kill if another process is competing.

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 10m
    labels:
      severity: warning
      service: system
    annotations:
      summary: "CPU usage at {{ $value | printf \"%.1f\" }}%"
      description: System CPU usage exceeds 80%.
