# DVC pipeline definition
# Displayed as a DAG in DagsHub: https://dagshub.com/zz75da/rakuten_z
#
# Three text-encoding paths feed into three independent training stages.
# The image branch and PCA are shared between all encoders.
# All stages run inside Docker via train-api/predict-api (see docker-compose.yml).
# Files are produced outside dvc repro — use `dvc commit -f && dvc push` to sync.

stages:

  # ── Text encoding ─────────────────────────────────────────────────────────

  preprocess_text_cv:
    desc: "SpaCy lemmatisation + CountVectorizer(5000) → text_features.npy + text_vectorizer.pkl"
    cmd: python train-api/services/preprocess_text.py
    deps:
      - data/X_train_update.csv
      - train-api/services/preprocess_text.py
    outs:
      - data/feature_cache/text_features.npy
      - data/artifacts/text_vectorizer.pkl

  preprocess_text_minilm:
    desc: "paraphrase-multilingual-MiniLM-L12-v2 sentence embeddings → text_features_minilm.npy"
    cmd: python minilm-encoder/encode.py
    deps:
      - data/X_train_update.csv
      - minilm-encoder/encode.py
      - minilm-encoder/app.py
    outs:
      - data/feature_cache/text_features_minilm.npy

  preprocess_text_clip:
    desc: "CLIP ViT-B/32 text encoder (openai/clip-vit-base-patch32) → text_features_clip.npy (512-d)"
    cmd: python clip-encoder/app.py
    deps:
      - data/X_train_update.csv
      - clip-encoder/app.py
    outs:
      - data/feature_cache/text_features_clip.npy

  # ── Image encoding ────────────────────────────────────────────────────────

  preprocess_image:
    desc: "ResNet50 (ImageNet, global avg pool, no top) → image_features.npy (2048-d per sample)"
    cmd: python train-api/services/preprocess_image.py
    deps:
      - data/images/image_train
      - train-api/services/preprocess_image.py
    outs:
      - data/feature_cache/image_features.npy

  # ── Dimensionality reduction ──────────────────────────────────────────────

  reduce_features_cv:
    desc: "IncrementalPCA: text 5000→1024, image 2048→300 — produces shared pca_image.pkl"
    cmd: python train-api/services/run_pca.py
              data/feature_cache/text_features.npy
              data/feature_cache/image_features.npy
              countvectorizer
              /tmp/pca_out_cv.json
    deps:
      - data/feature_cache/text_features.npy
      - data/feature_cache/image_features.npy
      - train-api/services/pca_reducer.py
      - train-api/services/run_pca.py
    outs:
      - data/artifacts/pca_text.pkl
      - data/artifacts/pca_image.pkl

  reduce_features_minilm:
    desc: "IncrementalPCA: image 2048→384 (reuses pca_image.pkl) for MiniLM 384-d text features"
    cmd: python train-api/services/run_pca.py
              data/feature_cache/text_features_minilm.npy
              data/feature_cache/image_features.npy
              minilm
              /tmp/pca_out_minilm.json
    deps:
      - data/feature_cache/text_features_minilm.npy
      - data/feature_cache/image_features.npy
      - data/artifacts/pca_image.pkl
      - train-api/services/pca_reducer.py
      - train-api/services/run_pca.py

  reduce_features_clip:
    desc: "IncrementalPCA: image 2048→384 (reuses pca_image.pkl) for CLIP 512-d text features"
    cmd: python train-api/services/run_pca.py
              data/feature_cache/text_features_clip.npy
              data/feature_cache/image_features.npy
              clip
              /tmp/pca_out_clip.json
    deps:
      - data/feature_cache/text_features_clip.npy
      - data/feature_cache/image_features.npy
      - data/artifacts/pca_image.pkl
      - train-api/services/pca_reducer.py
      - train-api/services/run_pca.py

  # ── Model training ────────────────────────────────────────────────────────

  train_cv:
    desc: "Train Dense(512→256→27) on 1324-d features — registers rakuten_multimodal_cv in MLflow"
    cmd: python train-api/services/run_full_pipeline.py
              cv_dvc countvectorizer 10 32 false true
    deps:
      - data/artifacts/pca_text.pkl
      - data/artifacts/pca_image.pkl
      - data/feature_cache/text_features.npy
      - data/feature_cache/image_features.npy
      - data/artifacts/text_vectorizer.pkl
      - data/Y_train_CVw08PX.csv
      - train-api/services/trainer.py
      - train-api/services/run_full_pipeline.py
    outs:
      - data/artifacts/neural_network_model.keras
      - data/artifacts/label_encoder.pkl
      - data/artifacts/train_history.json
    metrics:
      - data/artifacts/metrics_cv.json:
          cache: false

  train_minilm:
    desc: "Train Dense(512→256→27) on 768-d features — registers rakuten_multimodal_minilm in MLflow"
    cmd: python train-api/services/run_full_pipeline.py
              minilm_dvc minilm 10 32 false true
    deps:
      - data/artifacts/pca_image.pkl
      - data/feature_cache/text_features_minilm.npy
      - data/feature_cache/image_features.npy
      - data/Y_train_CVw08PX.csv
      - train-api/services/trainer.py
      - train-api/services/run_full_pipeline.py
    outs:
      - data/artifacts/neural_network_model_minilm.keras
      - data/artifacts/train_history_minilm.json
    metrics:
      - data/artifacts/metrics_minilm.json:
          cache: false

  train_clip:
    desc: "Train Dense(512→256→27) on 896-d features — registers rakuten_multimodal_clip in MLflow"
    cmd: python train-api/services/run_full_pipeline.py
              clip_dvc clip 10 32 false true
    deps:
      - data/artifacts/pca_image.pkl
      - data/feature_cache/text_features_clip.npy
      - data/feature_cache/image_features.npy
      - data/Y_train_CVw08PX.csv
      - train-api/services/trainer.py
      - train-api/services/run_full_pipeline.py
    outs:
      - data/artifacts/neural_network_model_clip.keras
      - data/artifacts/train_history_clip.json
    metrics:
      - data/artifacts/metrics_clip.json:
          cache: false

  # ── Inference service ─────────────────────────────────────────────────────

  predict:
    desc: "predict-api loads all three models — serves /predict-text?model=cv|minilm|clip"
    cmd: uvicorn app:app --host 0.0.0.0 --port 5003
    deps:
      - data/artifacts/neural_network_model.keras
      - data/artifacts/neural_network_model_minilm.keras
      - data/artifacts/neural_network_model_clip.keras
      - data/artifacts/label_encoder.pkl
      - data/artifacts/text_vectorizer.pkl
      - data/artifacts/pca_text.pkl
      - data/artifacts/pca_image.pkl
      - predict-api/app.py
