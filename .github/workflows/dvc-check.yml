name: DVC + Tests CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dvc-tests:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}  # Project root for dynamic imports

    steps:
      # --- Checkout code ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Set up Python and cache pip ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10
          cache: "pip"

      # --- Cache DVC ---
      - name: Cache DVC
        uses: actions/cache@v3
        with:
          path: .dvc/cache
          key: ${{ runner.os }}-dvc-${{ hashFiles('**/*.dvc') }}

      # --- Install dependencies ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[s3] boto3 tqdm psutil scikit-learn pytest

      # --- Configure DVC remote (DagsHub S3) ---
      - name: Configure DVC remote
        env:
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify origin access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify origin secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify origin endpointurl https://dagshub.com/api/v1/repo-buckets/s3/zz75da
          dvc remote modify origin auth basic
          dvc remote modify origin user $DAGSHUB_USER
          dvc remote modify origin password $DAGSHUB_TOKEN

      # --- Pull DVC-tracked data and artifacts ---
      - name: DVC pull
        run: dvc pull -v

      # --- Reproduce pipeline ---
      - name: DVC repro
        run: dvc repro -v

      # --- Verify pipeline status ---
      - name: DVC status
        run: dvc status -c

      # --- Run unit tests ---
      - name: Run unit tests
        run: |
          pytest tests/unit --maxfail=1 --disable-warnings -v

      # --- Run integration tests ---
      - name: Run integration tests
        run: |
          pytest tests/integration --maxfail=1 --disable-warnings -v -m integration
