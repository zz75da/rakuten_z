# =============================================================================
# Rakuten MLOps — Experiment Parameters
# =============================================================================
# Edit this file to run a new experiment. The DAG reads it at training time
# and MLflow logs every value automatically, so each DAG run is one
# comparable experiment point in DagsHub → Experiments.
#
# SAFE TO CHANGE:  model.*, minilm.normalize_embeddings, preprocess.pca_components,
#                  preprocess.cv_max_features, train.epochs
# DO NOT CHANGE:   preprocess.image_batch_size, preprocess.minilm_batch_size,
#                  train.batch_size  — RAM/OOM risk on this machine (10 GB disk,
#                  training already peaks at ~3 GB RAM)
# =============================================================================

preprocess:
  image_size: [224, 224]

  # --- Batch sizes: DO NOT INCREASE (RAM / OOM risk) ---
  image_batch_size: 64        # ResNet50 feature extraction; 64 × 3×224×224 ≈ 18 MB/batch
  minilm_batch_size: 256      # sentence-transformers encoding batch
  pca_batch_size: 512         # IncrementalPCA fitting batch

  # --- Safe to experiment ---
  pca_components: 384         # was 300 — more expressive features; aligns with hidden_1=768
                              # disk impact: X_reduced.npy grows ~57 MB (204→261 MB)
                              # CV input: 384+384=768-d  MiniLM input: 384+384=768-d
  cv_max_features: 10000      # was 5000 — richer vocabulary for CountVectorizer
                              # no disk impact (PCA output size unchanged)

train:
  # --- DO NOT INCREASE batch_size (OOM risk) ---
  batch_size: 128

  # --- Safe to experiment ---
  epochs: 30                  # hard cap; early stopping usually triggers before this
  random_seed: 42

model:
  # Neural network architecture — all safe to experiment
  # Rationale: observed 11% train/val gap (83% vs 72%) → overfitting.
  # Fix: lower LR to slow convergence, raise dropout to regularise,
  #      widen layers to match larger 768-d input, give early stopping more room.
  learning_rate: 0.0005       # was 0.001 — slower, more stable convergence
  hidden_1: 768               # was 512 — matches 768-d input dim (pca_components×2)
  hidden_2: 384               # was 256 — proportional to hidden_1
  dropout_1: 0.4              # was 0.3 — stronger regularisation (overfitting observed)
  dropout_2: 0.3              # was 0.2 — stronger regularisation
  early_stopping_patience: 8  # was 5 — more exploration before stopping;
                              # lower LR means slower progress, needs more patience

minilm:
  # MiniLM encoder settings — safe to experiment
  normalize_embeddings: true   # was false — projects embeddings onto unit sphere;
                               # unit-norm features consistently improve downstream NN
                               # NOTE: requires rebuilding minilm-encoder container
                               # after changing (docker-compose up -d --build minilm-encoder)
