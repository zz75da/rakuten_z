# =============================================================================
# Rakuten MLOps — Experiment Parameters
# =============================================================================
# Edit this file to run a new experiment. The DAG reads it at training time
# and MLflow logs every value automatically, so each DAG run is one
# comparable experiment point in DagsHub → Experiments.
#
# SAFE TO CHANGE:  model.*, minilm.normalize_embeddings, preprocess.pca_components,
#                  preprocess.cv_max_features, preprocess.n_text_pca_components, train.epochs
# DO NOT CHANGE:   preprocess.image_batch_size, preprocess.minilm_batch_size,
#                  train.batch_size  — RAM/OOM risk on this machine (20 GB disk,
#                  training already peaks at ~3 GB RAM)
# =============================================================================

preprocess:
  image_size: [224, 224]

  # --- Batch sizes: DO NOT INCREASE (RAM / OOM risk) ---
  image_batch_size: 64        # ResNet50 feature extraction; 64 × 3×224×224 ≈ 18 MB/batch
  minilm_batch_size: 256      # sentence-transformers encoding batch
  pca_batch_size: 512         # IncrementalPCA fitting batch

  # --- Safe to experiment ---
  pca_components: 384         # image PCA output dim (was 300)
                              # disk: X_reduced.npy ~+60 MB per +100 components
  n_text_pca_components: 2048 # CV text PCA output dim (was 1024, capped by initial_batch_size)
                              # disk: X_reduced.npy grows ~+350 MB vs current 478 MB
                              # CV input becomes 2048+384=2432-d
                              # MiniLM unaffected (uses raw 384-d embeddings, no text PCA)
  cv_max_features: 10000      # CountVectorizer vocabulary size (CV encoder only, was 5000)
                              # disk: text_features.npy 1.7 GB → 3.4 GB (+1.7 GB)

train:
  # --- DO NOT INCREASE batch_size (OOM risk) ---
  batch_size: 128

  # --- Safe to experiment ---
  epochs: 30                  # hard cap; early stopping usually triggers before this
  random_seed: 42

model:
  # Neural network architecture — all safe to experiment
  learning_rate: 0.0005       # was 0.001 — slower, more stable convergence
  hidden_1: 1024              # was 768 — wider to match new 2432-d CV input (ratio 2.4:1)
  hidden_2: 384               # proportional to hidden_1
  dropout_1: 0.4              # stronger regularisation (overfitting observed)
  dropout_2: 0.3              # stronger regularisation
  l2_reg: 0.001               # L2 weight regularisation on dense layers; targets 12pp overfit gap
                              # try: 0.0001, 0.0005, 0.005
  early_stopping_patience: 8  # epochs without val_loss improvement before stopping
  lr_patience: 4              # epochs without val_loss improvement before LR drop (was 2)
  lr_factor: 0.5              # LR reduction multiplier (was 0.3 — gentler decay)

minilm:
  # MiniLM encoder settings — safe to experiment
  normalize_embeddings: true   # project embeddings onto unit sphere before training
                               # NOTE: requires rebuilding minilm-encoder container
                               # after changing (docker-compose up -d --build minilm-encoder)
